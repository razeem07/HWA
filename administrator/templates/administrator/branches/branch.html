{% extends "administrator/shared/base.html" %}
{% block title %}Add Branch{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-6">

            <h4 class="mb-4">Create Branch</h4>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Branch Name</label>
                    {{ form.name }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    {{ form.description }}
                </div>

                <div class="form-check mb-3">
                    {{ form.is_active }}
                    <label class="form-check-label">Active</label>
                </div>

                <button type="submit" class="btn btn-primary">
                    Save Branch
                </button>
                <a href="{% url 'administrator:dashboard' %}" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>
    </div>
</div>
{% endblock %}
