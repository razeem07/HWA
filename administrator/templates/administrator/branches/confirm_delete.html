{% extends "administrator/shared/base.html" %}
{% block title %}Delete Branch{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-sm border-danger">
                <div class="card-body">

                    <h5 class="text-danger mb-3">Confirm Delete</h5>

                    <p>
                        Are you sure you want to delete the branch:
                        <strong>{{ object.name }}</strong>?
                    </p>

                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">
                            Yes, Delete
                        </button>
                        <a href="{% url 'administrator:branch-list' %}" class="btn btn-secondary">
                            Cancel
                        </a>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
